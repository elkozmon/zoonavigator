<!--suppress HtmlUnknownTag, HtmlUnknownAttribute -->
<button
  mat-icon-button
  matTooltip="Toggle select all"
  matTooltipPosition="below"
  (click)="onSelectAllClick()">
  <mat-icon class="mat-24">select_all</mat-icon>
</button>

<button
  mat-icon-button
  matTooltip="Toggle ordering direction"
  matTooltipPosition="below"
  [@flippedState]="toggleSortButtonFlippedState"
  (click)="onToggleSortClick()">
  <mat-icon class="mat-24">sort</mat-icon>
</button>

<button
  mat-icon-button
  matTooltip="Import nodes"
  matTooltipPosition="below"
  (click)="onImportClick()">
  <mat-icon class="mat-24">cloud_upload</mat-icon>
</button>

<button
  mat-icon-button
  matTooltip="Create node"
  matTooltipPosition="below"
  (click)="onCreateClick()">
  <mat-icon class="mat-24">create_new_folder</mat-icon>
</button>

<button
  mat-icon-button
  matTooltip="Selected nodes actions ..."
  matTooltipPosition="below"
  [matMenuTriggerFor]="selectedNodesMenu"
  [disabled]="zNodes.length === 0"
  >
  @switch (zNodes.length) {
    @case (0) {
      <mat-icon class="mat-24">filter_none</mat-icon>
    }
    @case (1) {
      <mat-icon class="mat-24 active-selected">filter_1</mat-icon>
    }
    @case (2) {
      <mat-icon class="mat-24 active-selected">filter_2</mat-icon>
    }
    @case (3) {
      <mat-icon class="mat-24 active-selected">filter_3</mat-icon>
    }
    @case (4) {
      <mat-icon class="mat-24 active-selected">filter_4</mat-icon>
    }
    @case (5) {
      <mat-icon class="mat-24 active-selected">filter_5</mat-icon>
    }
    @case (6) {
      <mat-icon class="mat-24 active-selected">filter_6</mat-icon>
    }
    @case (7) {
      <mat-icon class="mat-24 active-selected">filter_7</mat-icon>
    }
    @case (8) {
      <mat-icon class="mat-24 active-selected">filter_8</mat-icon>
    }
    @case (9) {
      <mat-icon class="mat-24 active-selected">filter_9</mat-icon>
    }
    @default {
      <mat-icon class="mat-24 active-selected">filter_9_plus</mat-icon>
    }
  }
</button>
<mat-menu #selectedNodesMenu="matMenu">
  <button
    mat-menu-item
    (click)="onDeleteClick()">
    <mat-icon>delete_forever</mat-icon><span>Delete</span>
  </button>
  <button
    mat-menu-item
    (click)="onExportClick()">
    <mat-icon>cloud_download</mat-icon><span>Export</span>
  </button>
</mat-menu>
