<!--suppress HtmlUnknownAttribute, JSBitwiseOperatorUsage -->
<div class="zoo-editor-shell">
  <mat-toolbar color="primary" class="zoo-editor-titlebar">
    <mat-icon svgIcon="assets:paw" class="zoo-editor-logo"></mat-icon>
    <span>ZooNavigator</span>
    <span flex></span>
    <a
      mat-icon-button
      href="https://www.paypal.me/elkozmon"
      target="_blank"
      matTooltip="Donate"
      matTooltipPosition="below">
      <i class="fa fa-heart mat-24" aria-hidden="true"></i>
    </a>
    <a
      mat-icon-button
      [href]="docsUrl"
      target="_blank"
      matTooltip="Documentation"
      matTooltipPosition="below">
      <i class="fa fa-book mat-24" aria-hidden="true"></i>
    </a>
    <a
      mat-icon-button
      href="https://github.com/elkozmon/zoonavigator"
      target="_blank"
      matTooltip="GitHub"
      matTooltipPosition="below">
      <i class="fa fa-github mat-24" aria-hidden="true"></i>
    </a>
    <a
      mat-icon-button
      matTooltip="Disconnect"
      matTooltipPosition="below"
      (click)="disconnect()">
      <i class="fa fa-sign-out mat-24" aria-hidden="true"></i>
    </a>
  </mat-toolbar>

  <mat-sidenav-container class="zoo-editor-container">
    <mat-sidenav
      #manageList
      [opened]="isGtSm | async"
      [mode]="(isGtSm | async) ? 'side' :  'over'"
      [style.width]="(isGtXs | async) ? '309px' : '100%'">
      <mat-toolbar>
        <zoo-editor-nav-actions
          [zPath]="zPath | async"
          [zNodes]="selectedFilteredNodes"
          [(ordering)]="childrenOrdering"
          (refresh)="reloadEditor()"
          (selectAll)="toggleSelectAll()">
        </zoo-editor-nav-actions>
      </mat-toolbar>

      <mat-nav-list (click)="closeManageListForSmallScreens(manageList)">
        <div class="zoo-list-actions">
          <zoo-regexp-filter
            #childrenFilter
            matTooltip="Regexp filter"
            matTooltipPosition="below"
            (regexpChange)="onFilterRegexpChange($event)">
          </zoo-regexp-filter>
        </div>
        <zoo-editor-nav-list
          [zPath]="zPath | async"
          [zNodesChildren]="childrenZNodes"
          [zNodesFiltered]="childrenFilterRegexp ? filteredZNodes : null"
          [zNodesSelected]="selectedFilteredNodes"
          [zNodesOrdering]="childrenOrdering"
          (refresh)="reloadEditor()"
          (select)="selectZNode($event)"
          (deselect)="deselectZNode($event)">
        </zoo-editor-nav-list>
        @if (childrenZNodes.length === 0) {
          <div class="zoo-nav-info bgc-grey-200 tc-grey-900">
            <mat-icon class="mat-18">info_outline</mat-icon>
            There are no child nodes
          </div>
        }
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="zoo-editor-main">
      <mat-toolbar>
        <div layout="row" layout-align="start center" flex>
          <zoo-toolbar
            [zPath]="zPath | async"
            [zNode]="zNode | async"
            (refresh)="reloadEditor()">
          </zoo-toolbar>
        </div>
      </mat-toolbar>

      <router-outlet>
      </router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
